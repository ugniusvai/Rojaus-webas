<!DOCTYPE html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Katalogas | Rojaus Galerija</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css?v=6" />
  </head>
  <body>
    <header class="editorial-header">
      <div class="header-left">
        <a href="/">Pradžia</a>
        <a href="/catalog" class="active">Katalogas</a>
      </div>
      <div class="header-right">
        <a href="/contact">Susisiekti</a>
      </div>
    </header>

    <main class="catalog">
      <section class="page-header editorial-page-header">
        <h1>Katalogas</h1>
      </section>

      <section class="editorial-list-container">
        <div class="editorial-list">
          {% for painting in paintings %}
          <div class="editorial-item">
            <a href="/painting/{{ painting.id }}" class="editorial-image-link">
              <img src="{{ painting.image }}" alt="{{ painting.title }}" onerror="this.src='/assets/painting1.jpg'" />
            </a>
            <div class="editorial-info">
              <div>
                <h3 class="editorial-title"><a href="/painting/{{ painting.id }}">{{ painting.title }}</a></h3>
                <p class="editorial-author">{{ painting.technique }}</p>
                <p class="editorial-desc">{{ painting.description }}</p>
              </div>
              <a href="/painting/{{ painting.id }}" class="editorial-price-link">{{ painting.price }} &rarr;</a>
            </div>
          </div>
          {% else %}
            <p style="text-align:center; padding: 100px;">Šiuo metu paveikslų nėra.</p>
          {% endfor %}
        </div>
      </section>
    </main>

    <footer>
      <div class="container">
        <p>&copy; 2026 Rojaus Galerija. Visos teisės saugomos.</p>
        <p style="margin-top: 15px;">
          <a href="https://www.instagram.com/_heaven_up_/" target="_blank" rel="noopener noreferrer" class="social-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
          </a>
        </p>
      </div>
    </footer>

    <script type="module" src="/main.js"></script>
  </body>
</html>
