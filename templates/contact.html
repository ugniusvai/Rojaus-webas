<!DOCTYPE html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Susisiekti | Rojaus Galerija</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css?v=8" />
  </head>
  <body>
    <header>
      <div class="container">
        <nav>
          <a href="/" class="logo">Rojaus Galerija</a>
          <ul class="nav-links">
            <li><a href="/">Pradžia</a></li>
            <li><a href="/catalog">Katalogas</a></li>
            <li><a href="/contact" class="active">Susisiekti</a></li>
          </ul>
          <div class="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </nav>
      </div>
    </header>

    <main>
      <section class="page-header">
        <div class="container">
          <h1>Susisiekite su mumis</h1>
          <p>Turite klausimų ar domina konkretus paveikslas? Parašykite mums arba paskambinkite.</p>
          
          <div class="contact-methods">
            <a href="tel:+37065514715" class="contact-link">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
              +370 655 14715
            </a>
            
            <a href="https://www.instagram.com/_heaven_up_/" target="_blank" rel="noopener noreferrer" class="contact-link social-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
            </a>
          </div>
        </div>
      </section>

      <section class="contact-section">
        <form class="contact-form" action="#" method="POST" onsubmit="event.preventDefault(); alert('Ačiū už jūsų žinutę! Susisieksime netrukus.');">
          <div class="form-group">
            <input type="text" id="name" name="name" required />
            <label for="name">Jūsų vardas</label>
          </div>
          
          <div class="form-group">
            <input type="email" id="email" name="email" required />
            <label for="email">El. pašto adresas</label>
          </div>

          <div class="form-group">
            <input type="text" id="subject" name="subject" value="{{ prefilled_subject }}" required />
            <label for="subject">Dominantis paveikslas / Tema</label>
          </div>
          
          <div class="form-group">
            <textarea id="message" name="message" required></textarea>
            <label for="message">Jūsų žinutė</label>
          </div>
          
          <button type="submit" class="btn">Siųsti žinutę</button>
        </form>
      </section>
    </main>

    <footer>
      <div class="container">
        <p>&copy; 2026 Rojaus Galerija. Visos teisės saugomos.</p>
        <p style="margin-top: 15px;">
          <a href="https://www.instagram.com/_heaven_up_/" target="_blank" rel="noopener noreferrer" class="social-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
          </a>
        </p>
      </div>
    </footer>

    <script type="module" src="/main.js"></script>
  </body>
</html>
