<!DOCTYPE html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ painting.title }} | Rojaus Galerija</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css?v=4" />
  </head>
  <body>
    <header>
      <div class="container">
        <nav>
          <a href="/" class="logo">Rojaus Galerija</a>
          <ul class="nav-links">
            <li><a href="/">Pradžia</a></li>
            <li><a href="/catalog" class="active">Katalogas</a></li>
            <li><a href="/contact">Susisiekti</a></li>
          </ul>
          <div class="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </nav>
      </div>
    </header>

    <main class="product-page">
      <div class="container product-layout">
        <div class="product-image-container">
          <img src="{{ painting.image }}" alt="{{ painting.title }}" onerror="this.src='/assets/painting1.jpg'" />
        </div>
        
        <div class="product-info-container">
          <a href="/catalog" class="back-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Grįžti į katalogą
          </a>
          
          <h1 class="product-title">{{ painting.title }}</h1>
          <p class="product-technique">{{ painting.technique }}</p>
          <p class="product-price">{{ painting.price }}</p>
          
          <div class="product-description">
            <p>{{ painting.description }}</p>
          </div>
          
          <div class="product-actions">
            <a href="/contact?subject=Domina paveikslas: {{ painting.title }}" class="btn product-btn">Susisiekti dėl šio kūrinio</a>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <div class="container">
        <p>&copy; 2026 Rojaus Galerija. Visos teisės saugomos.</p>
        <p style="margin-top: 15px;">
          <a href="https://www.instagram.com/_heaven_up_/" target="_blank" rel="noopener noreferrer" class="social-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
          </a>
        </p>
      </div>
    </footer>

    <script type="module" src="/main.js"></script>
  </body>
</html>
